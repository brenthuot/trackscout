name: TFRRS Scraper

on:
  # Run automatically every night at 2am UTC
  schedule:
    - cron: "0 2 * * *"

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually?"
        required: false
        default: "Manual backfill run"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5-hour limit (GitHub max is 6)

    steps:
      # 1. Check out your repo code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scraper/requirements.txt"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scraper/requirements.txt

      # 4. Run the scraper
      - name: Run TFRRS scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd scraper
          python tfrrs_scraper.py

      # 5. Print summary on success
      - name: Scraper completed
        if: success()
        run: echo "✅ Scraper finished successfully"

      # 6. Alert on failure
      - name: Scraper failed
        if: failure()
        run: echo "❌ Scraper failed — check logs above"
```

