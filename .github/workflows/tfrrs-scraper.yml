## Step 7 — Run It Manually (First Test)

Don't wait for 2am — trigger it now to confirm it works.

1. In your GitHub repo → click the **Actions** tab (top navigation)
2. In the left sidebar you'll see **TFRRS Scraper** — click it
3. Click the **Run workflow** dropdown button (right side)
4. Leave the reason field as-is → click **Run workflow**
5. A new row appears — click it to watch the live logs

You'll see output like:
