name: TFRRS Scraper

on:
  workflow_dispatch:
    inputs:
      group:
        description: 'Group to scrape (1-6 or all). 1=SEC+WCC, 2=BigTen+BigSky, 3=ACC+Ivy, 4=Big12+A10, 5=Pac12+American, 6=MWC+BigEast'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: ['1', '2', '3', '4', '5', '6']

    name: "Group ${{ matrix.group }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml supabase

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python tfrrs_scraper.py --group ${{ matrix.group }}
