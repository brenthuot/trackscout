name: Scrape TFRRS

on:
  workflow_dispatch:          # manual trigger from Actions tab
  schedule:
    - cron: "0 6 * * 1"      # every Monday at 6am UTC (weekly refresh)

jobs:
  scrape:
    name: "Group ${{ matrix.group }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false        # if one group fails, others keep running
      matrix:
        group: ["1", "2", "3", "4", "5", "6"]
        # Group 1: SEC + Big Ten         (~2,400 athletes)
        # Group 2: ACC + Big 12          (~2,100 athletes)
        # Group 3: Pac-12 + Ivy + BigEast (~2,500 athletes)
        # Group 4: Mountain West + BigSky (~1,800 athletes)
        # Group 5: American + Atlantic 10 (~1,900 athletes)
        # Group 6: West Coast             (~600 athletes)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper — Group ${{ matrix.group }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python scraper/tfrrs_scraper.py --group ${{ matrix.group }}
